<!doctype html>
<html lang="en" class="font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/blog.css" rel="stylesheet" />
    <style>
      .no-spinner {
        appearance: textfield;
      }

      .no-spinner::-webkit-outer-spin-button,
      .no-spinner::-webkit-inner-spin-button {
        appearance: none;
        margin: 0;
      }
    </style>
  </head>
  <body class="space-y-4 bg-white p-8 text-gray-900">
    <label class="block" for="defaultInput">
      <span class="text-sm font-medium text-gray-700"> Default </span>

      <input
        id="defaultInput"
        type="number"
        value="42"
        class="mt-0.5 w-full rounded border-gray-300 shadow-sm sm:text-sm"
      />
    </label>

    <label class="block" for="utilityInput">
      <span class="text-sm font-medium text-gray-700"> Utility </span>

      <input
        id="utilityInput"
        type="number"
        value="42"
        class="no-spinner mt-0.5 w-full rounded border-gray-300 shadow-sm sm:text-sm"
      />
    </label>

    <label class="block" for="inlineInput">
      <span class="text-sm font-medium text-gray-700">One-off inline Tailwind utilities</span>

      <input
        id="inlineInput"
        type="number"
        value="42"
        class="mt-0.5 w-full [appearance:textfield] rounded border-gray-300 shadow-sm sm:text-sm [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
      />
    </label>
  </body>
</html>
