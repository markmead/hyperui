<label class="block" for="defaultInput">
  <span class="text-sm font-medium text-gray-700"> Default </span>

  <input
    id="defaultInput"
    type="number"
    value="42"
    class="mt-0.5 w-full rounded border-gray-300 bg-white text-gray-900 shadow-sm sm:text-sm"
  />
</label>

<label class="block" for="utilityInput">
  <span class="text-sm font-medium text-gray-700"> Utility </span>

  <input
    id="utilityInput"
    type="number"
    value="42"
    class="no-spinner mt-0.5 w-full rounded border-gray-300 bg-white text-gray-900 shadow-sm sm:text-sm"
  />
</label>

<label class="block" for="inlineInput">
  <span class="text-sm font-medium text-gray-700">One-off inline Tailwind utilities</span>

  <input
    id="inlineInput"
    type="number"
    value="42"
    class="mt-0.5 w-full [appearance:textfield] rounded border-gray-300 bg-white text-gray-900 shadow-sm sm:text-sm [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:appearance-none"
  />
</label>
