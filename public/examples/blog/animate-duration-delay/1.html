<!doctype html>
<html lang="en" class="font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/blog.css" rel="stylesheet" />
    <script src="/component.js" defer></script>
  </head>
  <body class="bg-white p-8 text-gray-900">
    <div class="grid grid-cols-3 gap-4">
      <div class="space-y-4">
        <p class="font-medium">Duration</p>
        <p class="animate-duration-150 animate-pulse">150ms</p>
        <p class="animate-duration-300 animate-pulse">300ms</p>
        <p class="animate-duration-700 animate-pulse">700ms</p>
        <p class="animate-duration-3000 animate-pulse">3000ms</p>
      </div>

      <div class="space-y-4">
        <p class="font-medium">Delay</p>
        <p class="animate-delay-150 animate-pulse">150ms</p>
        <p class="animate-delay-300 animate-pulse">300ms</p>
        <p class="animate-delay-700 animate-pulse">700ms</p>
        <p class="animate-delay-3000 animate-pulse">3000ms</p>
      </div>

      <div class="space-y-4">
        <p class="font-medium">Easing</p>
        <p class="animate-ease-in animate-pulse">In</p>
        <p class="animate-ease-out animate-pulse">Out</p>
        <p class="animate-ease-in-out animate-pulse">In-out</p>
        <p class="animate-ease-[cubic-bezier(0.9,-0.7,0.1,1.7)] animate-pulse">Custom</p>
      </div>
    </div>
  </body>
</html>
