<!doctype html>
<html lang="en" class="dark font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/component.css" rel="stylesheet" />
    <script src="/component.js" defer></script>
  </head>
  <body class="mx-auto max-w-lg p-6">
    <div>
      <label for="Notes" class="text-black dark:text-white">
        <span class="text-sm font-semibold"> Notes </span>

        <textarea
          id="Notes"
          class="mt-0.5 w-full resize-none border-2 border-black dark:border-white bg-white dark:bg-gray-900 shadow-[4px_4px_0_0] shadow-black dark:shadow-white focus:ring-2 focus:ring-yellow-300 dark:focus:ring-yellow-600 sm:text-sm"
          rows="4"
        ></textarea>
      </label>

      <div class="mt-3 flex items-center justify-end gap-3">
        <button
          type="button"
          class="border-2 px-3 py-1.5 text-sm font-semibold text-black dark:text-white shadow-[2px_2px_0_0] shadow-black dark:shadow-white hover:bg-yellow-200 dark:hover:bg-yellow-700 focus:ring-2 focus:ring-yellow-300 dark:focus:ring-yellow-600 focus:outline-0"
        >
          Clear
        </button>

        <button
          type="button"
          class="border-2 bg-yellow-200 dark:bg-yellow-700 px-3 py-1.5 text-sm font-semibold text-black dark:text-white shadow-[2px_2px_0_0] shadow-black dark:shadow-white hover:bg-yellow-400 dark:hover:bg-yellow-500 focus:bg-yellow-200 dark:focus:bg-yellow-700 focus:ring-2 focus:ring-yellow-300 dark:focus:ring-yellow-600 focus:outline-0"
        >
          Save
        </button>
      </div>
    </div>
  </body>
</html>
