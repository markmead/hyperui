<!doctype html>
<html lang="en" class="dark font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/component.css" rel="stylesheet" />
    <script src="/component.js" defer></script>
  </head>
  <body class="mx-auto max-w-lg p-6">
    <fieldset>
      <legend class="sr-only">Checkboxes</legend>

      <div class="flex flex-col items-start gap-3">
        <label for="Option1" class="inline-flex items-center gap-3 text-black dark:text-white">
          <input
            type="checkbox"
            class="size-6 border-2 border-black bg-white shadow-[2px_2px_0_0] shadow-black checked:bg-black focus:ring-2 focus:ring-black dark:border-white dark:bg-gray-900 dark:shadow-white dark:focus:ring-white"
            id="Option1"
          />

          <span class="font-semibold"> Option 1 </span>
        </label>

        <label for="Option2" class="inline-flex items-center gap-3 text-black dark:text-white">
          <input
            type="checkbox"
            class="size-6 border-2 border-black bg-white shadow-[2px_2px_0_0] shadow-black checked:bg-black focus:ring-2 focus:ring-black dark:border-white dark:bg-gray-900 dark:shadow-white dark:focus:ring-white"
            id="Option2"
          />

          <span class="font-semibold"> Option 2 </span>
        </label>

        <label for="Option3" class="inline-flex items-center gap-3 text-black dark:text-white">
          <input
            type="checkbox"
            class="size-6 border-2 border-black bg-white shadow-[2px_2px_0_0] shadow-black checked:bg-black focus:ring-2 focus:ring-black dark:border-white dark:bg-gray-900 dark:shadow-white dark:focus:ring-white"
            id="Option3"
          />

          <span class="font-semibold"> Option 3 </span>
        </label>
      </div>
    </fieldset>
  </body>
</html>
