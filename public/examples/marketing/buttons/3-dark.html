<!doctype html>
<html lang="en" class="dark font-sans antialiased">

    <link href="/component.css" rel="stylesheet" />
    <script src="/component.js" defer></script>
  </head>
  <body class="flex flex-wrap justify-center gap-4 p-6">

      href="#"
    >
      <span class="sr-only">Add to cart</span>

      <svg
        class="size-5"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"

        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"

    <a
      class="inline-flex size-12 items-center justify-center rounded-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-gray-900 text-slate-600 dark:text-slate-300 shadow-sm transition-colors hover:border-slate-400 dark:hover:border-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-slate-50 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-slate-200 dark:focus-visible:ring-slate-700"

      <svg
        class="size-5"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 5v14m-7-7h14"
        />
      </svg>
    </a>
