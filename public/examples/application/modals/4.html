<!doctype html>
<html lang="en" class="dark font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/component.css" rel="stylesheet" />
    <script src="/component.js" defer></script>
  </head>
  <body class="p-6">
    <button
      data-modal-open
      class="rounded border border-gray-300 bg-gray-100 px-3 py-1.5 text-sm text-gray-900"
    >
      Open
    </button>

    <dialog
      closedby="any"
      aria-labelledby="modalTitle"
      aria-describedby="modalDescription"
      class="m-auto max-w-xl rounded-lg bg-white p-6 shadow-lg backdrop:bg-black/50"
    >
      <div class="flex flex-col gap-4">
        <div class="flex items-start justify-between">
          <h2 id="modalTitle" class="text-xl font-bold text-gray-900 sm:text-2xl">Modal Title</h2>

          <button
            type="button"
            data-modal-close
            class="-me-4 -mt-4 rounded-full p-2 text-gray-400 transition-colors hover:bg-gray-50 hover:text-gray-600 focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2 focus:ring-offset-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white focus-visible:outline-none"
            aria-label="Close"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="size-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>

        <p id="modalDescription" class="text-pretty text-gray-700">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Pellentesque euismod, nisi eu
          consectetur. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
        </p>

        <div class="flex justify-end gap-2">
          <button
            type="button"
            data-modal-close
            class="rounded bg-gray-100 px-4 py-2 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-200 focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2 focus:ring-offset-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white focus-visible:outline-none"
          >
            Cancel
          </button>

          <button
            type="button"
            data-modal-close
            class="rounded bg-blue-600 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-blue-700 focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2 focus:ring-offset-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white focus-visible:outline-none"
          >
            Done
          </button>
        </div>
      </div>
    </dialog>

    <script>
      const modalEl = document.querySelector('dialog')
      const openButtonEl = document.querySelector('[data-modal-open]')

      openButtonEl.addEventListener('click', () => modalEl.showModal())

      document.querySelectorAll('[data-modal-close]').forEach((buttonEl) => {
        buttonEl.addEventListener('click', () => modalEl.close())
      })
    </script>
  </body>
</html>
