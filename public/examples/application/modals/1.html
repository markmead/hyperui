<!doctype html>
<html lang="en" class="dark font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/component.css" rel="stylesheet" />
  </head>
  <body class="grid h-screen place-content-center">
    <button
      data-modal-open
      class="block rounded-lg border border-indigo-600 bg-indigo-600 px-12 py-3 text-sm font-medium text-white transition-colors hover:bg-transparent hover:text-indigo-600 focus:ring-2 focus:ring-indigo-600 focus:ring-offset-2 focus:ring-offset-white focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white focus-visible:outline-none"
    >
      Open Modal
    </button>

    <dialog
      closedby="any"
      aria-labelledby="modalTitle"
      aria-describedby="modalDescription"
      class="m-auto max-w-xl rounded-lg bg-white p-6 shadow-lg backdrop:bg-black/50"
    >
      <div class="flex flex-col gap-4">
        <h2 id="modalTitle" class="text-xl font-bold text-gray-900 sm:text-2xl">Modal Title</h2>

        <p id="modalDescription" class="text-pretty text-gray-700">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Pellentesque euismod, nisi eu
          consectetur. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
        </p>
      </div>
    </dialog>

    <script>
      const modal = document.querySelector('dialog')
      const openBtn = document.querySelector('[data-modal-open]')

      openBtn.addEventListener('click', () => modal.showModal())

      document.querySelectorAll('[data-modal-close]').forEach((button) => {
        button.addEventListener('click', () => modal.close())
      })
    </script>
  </body>
</html>
