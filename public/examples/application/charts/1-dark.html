<!doctype html>
<html lang="en" class="dark font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/component.css" rel="stylesheet" />
    <script src="/component.js" defer></script>
  </head>
  <body class="mx-auto max-w-lg p-6">
    <div class="rounded-lg border border-gray-800 bg-gray-900 p-6">
      <h2 class="text-sm font-medium text-white">Monthly revenue</h2>

      <div class="mt-4 h-64">
        <canvas
          id="revenue-line-chart"
          role="img"
          aria-label="Line chart showing monthly revenue rising from $28,000 in January to $48,000 in June"
        ></canvas>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script>
      const revenueLineChartCanvas = document.getElementById('revenue-line-chart')

      new Chart(revenueLineChartCanvas, {
        type: 'line',
        data: {
          labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
          datasets: [
            {
              label: 'Revenue',
              data: [28000, 34000, 31000, 39000, 42000, 48000],
              borderColor: '#f9fafb',
              backgroundColor: 'rgba(249, 250, 251, 0.08)',
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.35,
              fill: true,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (tooltipItem) => `$${tooltipItem.formattedValue}`,
              },
            },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#9ca3af' },
            },
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(255, 255, 255, 0.1)' },
              ticks: {
                color: '#9ca3af',
                callback: (tickValue) => `$${Number(tickValue) / 1000}k`,
              },
            },
          },
        },
      })
    </script>
  </body>
</html>
