<!doctype html>
<html lang="en" class="dark font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/component.css" rel="stylesheet" />
    <script src="/component.js" defer></script>
  </head>
  <body class="mx-auto max-w-lg p-6">
    <div class="rounded-lg border border-gray-800 bg-gray-900 p-6">
      <h2 class="text-sm font-medium text-white">Orders this week</h2>

      <div class="mt-4 h-64">
        <canvas
          id="weekly-orders-bar-chart"
          role="img"
          aria-label="Orders this week, bar chart"
        ></canvas>
      </div>

      <table class="sr-only">
        <caption>
          Orders per day this week
        </caption>
        <thead>
          <tr>
            <th scope="col">Day</th>
            <th scope="col">Orders</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row">Mon</th>
            <td>12</td>
          </tr>
          <tr>
            <th scope="row">Tue</th>
            <td>19</td>
          </tr>
          <tr>
            <th scope="row">Wed</th>
            <td>14</td>
          </tr>
          <tr>
            <th scope="row">Thu</th>
            <td>22</td>
          </tr>
          <tr>
            <th scope="row">Fri</th>
            <td>27</td>
          </tr>
          <tr>
            <th scope="row">Sat</th>
            <td>32</td>
          </tr>
          <tr>
            <th scope="row">Sun</th>
            <td>18</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script>
      const weeklyOrdersBarChartCanvas = document.getElementById('weekly-orders-bar-chart')

      new Chart(weeklyOrdersBarChartCanvas, {
        type: 'bar',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [
            {
              label: 'Orders',
              data: [12, 19, 14, 22, 27, 32, 18],
              backgroundColor: '#818cf8',
              hoverBackgroundColor: '#a5b4fc',
              borderRadius: 4,
              maxBarThickness: 32,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (tooltipItem) => `${tooltipItem.formattedValue} orders`,
              },
            },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#9ca3af' },
            },
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(255, 255, 255, 0.1)' },
              ticks: { color: '#9ca3af' },
            },
          },
        },
      })
    </script>
  </body>
</html>
