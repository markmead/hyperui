<!doctype html>
<html lang="en" class="dark font-sans antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/component.css" rel="stylesheet" />
    <script src="/component.js" defer></script>
  </head>
  <body class="mx-auto max-w-sm p-6">
    <div class="rounded-lg border border-gray-800 bg-gray-900 p-6">
      <h2 class="text-sm font-medium text-white">Traffic sources</h2>

      <div class="mt-4 h-64">
        <canvas
          id="traffic-sources-polar-area-chart"
          role="img"
          aria-label="Polar area chart showing traffic sources, with organic traffic the largest segment at 45 percent"
        ></canvas>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script>
      const trafficSourcesPolarAreaChartCanvas = document.getElementById(
        'traffic-sources-polar-area-chart',
      )

      new Chart(trafficSourcesPolarAreaChartCanvas, {
        type: 'polarArea',
        data: {
          labels: ['Organic', 'Paid', 'Referral', 'Direct'],
          datasets: [
            {
              data: [45, 25, 18, 12],
              backgroundColor: [
                'rgba(129, 140, 248, 0.7)',
                'rgba(52, 211, 153, 0.7)',
                'rgba(251, 191, 36, 0.7)',
                'rgba(251, 113, 133, 0.7)',
              ],
              hoverBackgroundColor: ['#818cf8', '#34d399', '#fbbf24', '#fb7185'],
              borderColor: '#111827',
              borderWidth: 2,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#9ca3af' },
            },
            tooltip: {
              callbacks: {
                label: (tooltipItem) => `${tooltipItem.label}: ${tooltipItem.formattedValue}%`,
              },
            },
          },
          scales: {
            r: {
              beginAtZero: true,
              angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
              grid: { color: 'rgba(255, 255, 255, 0.1)' },
              ticks: { display: false },
            },
          },
        },
      })
    </script>
  </body>
</html>
